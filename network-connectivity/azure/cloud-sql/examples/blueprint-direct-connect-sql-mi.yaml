# Devin Environment Blueprint: Azure SQL MI via Direct Connect
#
# Architecture: Option A1 -- Direct SQL connection over TLS.
# No Azure CLI, no service principal. Just a connection string.
# Azure SQL MI always enforces TLS.
#
# Required Devin Secrets (org-scoped):
#   DB_HOST       - MI endpoint (mi-name.public.abc123.database.windows.net,3342)
#   DB_USER       - SQL auth username (e.g., devin_dev)
#   DB_PASSWORD   - SQL auth password
#   DB_NAME       - Database name
#
# See: docs/option-a1-direct-connect-sql-mi.md

initialize: |
  # Install sqlcmd (Microsoft ODBC tools) -- persists in snapshot
  curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc > /dev/null
  echo "deb [arch=amd64] https://packages.microsoft.com/ubuntu/$(lsb_release -rs)/prod $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
  sudo apt-get update
  sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
  echo 'export PATH="$PATH:/opt/mssql-tools18/bin"' >> ~/.bashrc

# No maintenance commands needed -- sqlcmd connects directly.

knowledge:
  - name: database
    contents: |
      Dev database (Azure SQL MI) is at $DB_HOST.
      Connect with: sqlcmd -S $DB_HOST -d $DB_NAME -U $DB_USER -P $DB_PASSWORD
      Connection string: Server=tcp:$DB_HOST;Database=$DB_NAME;User ID=$DB_USER;Password=$DB_PASSWORD;Encrypt=true;TrustServerCertificate=false;
      TLS is always enforced by Azure SQL MI.
