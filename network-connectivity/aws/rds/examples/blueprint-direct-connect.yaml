# Devin Environment Blueprint: AWS RDS via Direct Connect
#
# Architecture: Option C — Direct PostgreSQL connection over TLS.
# No proxy, no AWS credentials. Just a connection string.
#
# Required Devin Secrets (org-scoped):
#   DB_HOST       - RDS instance endpoint (public, or reachable via your network path)
#   DB_USER       - PostgreSQL username (e.g., devin_dev)
#   DB_PASSWORD   - PostgreSQL password
#   DB_NAME       - Database name
#
# See: docs/option-c-direct-connect.md

# No initialize or maintenance commands needed.
# psql and libpq are already available in Devin sessions.

knowledge:
  - name: database
    contents: |
      Dev database (RDS PostgreSQL) is at $DB_HOST:5432.
      Connect with: psql "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:5432/$DB_NAME?sslmode=require"
      Always use sslmode=require for RDS connections.
